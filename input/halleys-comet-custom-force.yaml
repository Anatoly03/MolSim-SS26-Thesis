# This file describes the initial conditions for the simulation of Halley's comet.
# It uses a custom potential function which is equivalent to the Newton force to
# demonstrate that custom potential can be used.

name: halleys-comet
force:
  potential: M / r
algorithm: direct-sum

args:
  time_start: 0.0
  time_end: 1000.0
  time_step: 0.014

particles:
  - position: [0.0, 0.0, 0.0]
    mass: 1.0
  - position: [0.0, 1.0, 0.0]
    velocity:
      x: -1.0
    mass: 3.0e-6
  - position: [0.0, 5.36, 0.0]
    velocity:
      x: -0.425
    mass: 9.55e-4
  - position: [34.75, 0.0, 0.0]
    velocity:
      y: 0.0296
    mass: 1.0e-14
